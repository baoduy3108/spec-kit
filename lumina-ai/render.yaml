# ✦ LUMINA AI — deploy 1-click lên Render (https://render.com)
# Cách dùng: Render Dashboard → New → Blueprint → chọn repo GitHub này
# (Root Directory: lumina-ai) → điền các biến môi trường được hỏi.

services:
  - type: web
    name: lumina-ai
    runtime: python
    rootDir: lumina-ai
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # điền tay trong dashboard — không lưu vào git
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SECRET_KEY
        generateValue: true  # Render tự sinh chuỗi bí mật
      - key: ENABLE_FABLE
        value: "false"
      - key: RATE_LIMIT_RPM
        value: "10"
